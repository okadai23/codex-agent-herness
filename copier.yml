_min_copier_version: "9.0.0"
_subdirectory: template

project_name:
  type: str
  help: Product or service name
  default: sample-product

profile:
  type: str
  default: ts-fullstack
  choices:
    - ts-fullstack
    - python-ai-service
    - hybrid-product

sections:
  type: yaml
  default:
    base-toolchain: true
    agent-harness-core: true
    ts-fullstack: true
    api-contract-openapi: true
    frontend-e2e-monkey: true
    docs-maintenance: true
    db-lifecycle: true
    python-ai-core: false
    ai-evals: false
    ai-safety: false

_tasks:
  - "echo generated by copier"
